name: Products-Platform-UBUNTU-Ceph

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        type: environment
        default: staging
        required: true

      platform:
        description: 'Platform to build and deploy'
        required: true
        type: choice
        options:
          - net
          - java
        default: net

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 4320
    environment: ${{ inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ENDPOINT_URL: https://s3.dynabic.com
      AWS_RETRY_MODE: standard
      AWS_MAX_ATTEMPTS: "10"
      PLATFORM_INDEX_SITEMAP: index.platform.sitemap

    steps:
      - name: Clean runner workspace
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout theme repo
        uses: actions/checkout@v4
        with:
          repository: conholdate/products.conholdate.com
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0
          clean: true
          submodules: false
          persist-credentials: false
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2.4.13
        with:
          hugo-version: 0.101.0
          extended: true

      - name: Install Node.js dependencies
        working-directory: ./site
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Configure build environment
        working-directory: ./site
        env:
          CONFIGURE_ONE_PLATFORM: ${{ inputs.platform }}
        shell: bash
        run: |
          set -euo pipefail
          npm run splitbyplatform

      - name: Build ${{ inputs.platform }}
        working-directory: ./site
        shell: bash
        run: |
          set -euo pipefail
          hugo --config "./split-build-config.toml","./platform.json" \
               -b "${{ vars.BASEURL }}" \
               --cleanDestinationDir \
               --minify \
               --gc

      - name: Prepare public folder
        working-directory: ./site
        shell: bash
        run: |
          set -euo pipefail

          find ./public -type f -name 'sitemap.xml' \
            -execdir mv -f '{}' "${{ inputs.platform }}.xml" \;

          if [ -f "${PLATFORM_INDEX_SITEMAP}" ]; then
            mv -f "${PLATFORM_INDEX_SITEMAP}" public/platform-sitemaps.xml
          else
            echo "Warning: ${PLATFORM_INDEX_SITEMAP} not found. Skipping move."
          fi

      - name: Sync to Ceph S3 Bucket
        working-directory: ./site
        shell: bash
        run: |
          set -euo pipefail

          export AWS_CONFIG_FILE="$RUNNER_TEMP/aws-config"
          mkdir -p "$(dirname "$AWS_CONFIG_FILE")"
          touch "$AWS_CONFIG_FILE"

          # Safer transfer tuning for Ceph/S3-compatible storage
          aws configure set default.s3.max_concurrent_requests 5
          aws configure set default.s3.max_queue_size 10000

          attempt=1
          max_attempts=4
          sleep_seconds=60

          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Deploying to Ceph S3 bucket... attempt ${attempt}/${max_attempts}"

            if aws s3 sync ./public/ s3://products-conholdate-com/ \
              --endpoint-url "$AWS_ENDPOINT_URL" \
              --acl public-read \
              --no-progress \
              --cli-connect-timeout 60 \
              --cli-read-timeout 300 \
              2>&1 | tee "$GITHUB_WORKSPACE/ceph-sync.log"; then
              echo "Ceph sync completed successfully."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Ceph sync failed on attempt ${attempt}. Waiting ${sleep_seconds}s before retry..."
              sleep "$sleep_seconds"
            fi

            attempt=$((attempt + 1))
          done

          echo "Ceph sync failed after ${max_attempts} attempts."
          exit 1

      - name: Upload Ceph sync log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ceph-sync-log-${{ inputs.platform }}
          path: ${{ github.workspace }}/ceph-sync.log
          if-no-files-found: ignore

      - name: Purge BunnyCDN
        if: success()
        run: |
          curl -siG \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.conholdate.com/*" \
            "https://api.dynabic.com/bn/purge?async=true"
